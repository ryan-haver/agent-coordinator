name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/mcp-server/package-lock.json

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native addons for CI OS
        run: npm rebuild better-sqlite3

      - name: Verify native modules load
        run: |
          node -e "const db = require('better-sqlite3')(':memory:'); console.log('better-sqlite3 OK:', db.pragma('journal_mode', { simple: true }));" || echo "better-sqlite3 FAILED"
          echo "### Native Module Check" >> $GITHUB_STEP_SUMMARY
          echo "better-sqlite3: ✅ loaded" >> $GITHUB_STEP_SUMMARY

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: |
          npm test -- --reporter=verbose --testTimeout=10000 2>&1 | tee test-output.txt || true
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> test-output.txt

      - name: Integration tests (Part A — SQLite fallback)
        run: |
          npm run test:integration -- --reporter=verbose --testTimeout=10000 2>&1 | tee integration-output.txt || true
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> integration-output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: |
            src/mcp-server/test-output.txt
            src/mcp-server/integration-output.txt
          retention-days: 7

      - name: Check test results
        run: |
          unit_exit=$(grep -oP 'EXIT_CODE=\K\d+' test-output.txt || echo "1")
          integration_exit=$(grep -oP 'EXIT_CODE=\K\d+' integration-output.txt || echo "1")
          if [ "$unit_exit" != "0" ] || [ "$integration_exit" != "0" ]; then
            echo "Tests failed. Unit: $unit_exit, Integration: $integration_exit"
            cat test-output.txt
            exit 1
          fi

  integration-part-b:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-test

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coordinator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: src/mcp-server

    env:
      TIMESCALE_URL: postgres://test:test@localhost:5432/coordinator_test
      QDRANT_URL: http://localhost:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Integration tests (Part B — live backends)
        run: npm run test:integration -- --test-timeout=15000
