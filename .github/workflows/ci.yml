name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/mcp-server/package-lock.json

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native addons
        run: npm rebuild better-sqlite3

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Integration tests (Part A — SQLite fallback)
        run: npm run test:integration


  integration-part-b:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-test

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coordinator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    defaults:
      run:
        working-directory: src/mcp-server

    env:
      TIMESCALE_URL: postgres://test:test@localhost:5432/coordinator_test
      QDRANT_URL: http://localhost:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/mcp-server/package-lock.json

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native addons
        run: npm rebuild better-sqlite3

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/healthz && break
            echo "Waiting for Qdrant... ($i/30)"
            sleep 2
          done

      - name: Integration tests (Part B — live backends)
        run: npm run test:integration
