# Docker Compose — CI Test Environment
# Provides TimescaleDB + Qdrant for Part B integration tests.
# Usage: pwsh scripts/ci-test.ps1

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: coordinator
      POSTGRES_PASSWORD: ci_test
      POSTGRES_DB: telemetry
    ports:
      - "5444:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U coordinator -d telemetry" ]
      interval: 3s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:6333/readyz" ]
      interval: 3s
      timeout: 5s
      retries: 10
